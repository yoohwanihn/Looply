# =============================================
# 사내 SNS 플랫폼 - 개발 환경 (Dev)
# 기술스택: PostgreSQL 17 / Redis 7.4 / Spring Boot 3.5 / React 19 + Vite 8
# 실행: docker compose up -d
# =============================================

services:

  # ── PostgreSQL 17 ────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: sns-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sns_db}
      POSTGRES_USER: ${POSTGRES_USER:-sns_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_db_password}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sns_user} -d ${POSTGRES_DB:-sns_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sns-net

  # ── Redis 7.4 ────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: sns-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sns-net

  # ── Spring Boot 3.5 (Backend) ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: sns-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-sns_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sns_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme_db_password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis_password}
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_must_be_at_least_256bits_long_string_here}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-3600000}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-604800000}
      TZ: Asia/Seoul
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/workspace
      - gradle_cache:/root/.gradle
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sns-net

  # ── React 19 + Vite 8 (Frontend) ──────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: sns-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080/ws
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/workspace
      - node_modules:/workspace/node_modules
    depends_on:
      - backend
    networks:
      - sns-net

volumes:
  postgres_data:
  redis_data:
  gradle_cache:
  node_modules:

networks:
  sns-net:
    driver: bridge
