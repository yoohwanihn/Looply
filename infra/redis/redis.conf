# Redis 7.4.x 설정 — 사내 SNS 플랫폼
# 역할: 실시간 알림 Pub/Sub, 세션 관리, 타임라인 캐시

# 기본 설정
bind 0.0.0.0
protected-mode yes
port 6379

# 메모리 (docker-compose.yml의 command와 중복 설정 가능 — compose 우선)
maxmemory 256mb
maxmemory-policy allkeys-lru

# Pub/Sub 채널 알림 활성화 (실시간 알림 이벤트용)
notify-keyspace-events "Ex"

# AOF 영속성 (개발환경 — 재시작 후 데이터 유지)
appendonly yes
appendfsync everysec

# 슬로우 로그
slowlog-log-slower-than 10000
slowlog-max-len 128
