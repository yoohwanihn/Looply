global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Spring Boot Actuator 메트릭
  - job_name: 'sns-backend'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['backend:8080']

  # Redis 메트릭 (redis-exporter 추가 시)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
